<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
	<title>Магазин роллов</title>
	<link rel="stylesheet" href="libs/bootstrap/css/bootstrap.min.css">
	<link rel="stylesheet" href="css/main.css">
	<link href="https://fonts.googleapis.com/css?family=Merriweather:300,400,400i,700&amp;subset=cyrillic-ext" rel="stylesheet">

</head>

<body>
 
	<header class="header">
		<div class="container text-center">
			<img src="img/logo/logo.svg" width="92" alt="Суши и пицца">
			<div class="display-4">Доставка роллов</div>
			<p class="lead">Оперативно и вкусно</p>
		</div>
	</header>

	<div class="container mb-5">
		<div class="row">
			<div class="col-md-8">
				<!-- Товары -->
				<div class="row" id="product-cards">
				</div>
			</div>
			<div class="col-md-4">

				<!-- Корзина -->
				<div class="card mb-4">
					<div class="card-body">
						<h5 class="card-title">Ваш заказ</h5>
						<div data-cart-empty class="alert alert-secondary" role="alert">
							Корзина пуста
						</div>
						<!-- cart-wrapper -->
						<div class="cart-wrapper">

						</div>
						<!-- // cart-wrapper -->

						<!-- Стоимость заказа -->
						<div class="cart-total none">
							<p><span class="h5">Доставка:</span> <span class="delivery-cost free">бесплатно</span> </p>
							<p><span class="h5">Итого:</span> <span class="total-price">330</span> <span class="rouble">₽</span></p>
						</div>
						<!-- // Стоимость заказа -->

					</div>

					<!-- Оформить заказ -->
					<div id="order-form" class="card-body border-top none">
						<h5 class="card-title">Оформить заказ</h5>
						<form id="orderForm" action="#" method="POST" novalidate data-js-form>
							<div class="form-group">
								<input type="text" class="form-control" placeholder="Ваше имя" required aria-errormessage="name-error"><span class="field-error" id="name-error"></span>
								<input type="text" class="form-control" min-length="8" placeholder="Ваш номер телефона" required aria-errormessage="phone-error"><span class="field-error" id="phone-error"></span>
								<input type="text" class="form-control" placeholder="Адрес доставки" required aria-errormessage="address-error"><span class="field-error" id="address-error"></span>
								<fieldset class="radios">
									<label class="form-check-label">Способ оплаты:</label>
									<input type="radio"
									 class="form-check-input"
									  value="Наличными"
									   required
									    aria-errormessage="payment-error"
										/>
									<label class="form-check-label">Наличными</label>
									<span class="field-error" id="payment-error"></span>
									<input type="radio" 
									class="form-check-input" 
									value="Картой" 
									required
									/>
									<label class="form-check-label">Картой</label>
								</fieldset>
								<textarea id="comment" class="form-control" placeholder="Комментарий"></textarea>
							</div>
							<button type="submit" class="btn btn-primary">Заказать</button>
						</form>
					</div>
					<!-- // Оформить заказ -->

				</div>
				<!-- // Корзина -->
			</div>
		</div>
	</div>
	<script src="js/app.js"></script>
	<script src="js/products.js"></script>
	<script src="js/cart.js"></script>
</body>

</html>
